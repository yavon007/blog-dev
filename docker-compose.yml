services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blog}
      POSTGRES_USER: ${POSTGRES_USER:-blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 生产环境不暴露端口，仅容器内网络可达
    # ports: ["5432:5432"]  # 仅本地调试时开启
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blog}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7.4-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redisdata:/data
    # ports: ["6379:6379"]  # 仅本地调试时开启
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192m

  migrate:
    image: migrate/migrate:v4.17.1
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-blog}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-blog}?sslmode=disable"
      - "up"
    volumes:
      - ./backend/migrations:/migrations:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: "8080"
      DATABASE_URL: "postgres://${POSTGRES_USER:-blog}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-blog}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      JWT_ACCESS_TTL: "${JWT_ACCESS_TTL:-15m}"
      JWT_REFRESH_TTL: "${JWT_REFRESH_TTL:-720h}"
      PUBLIC_ALLOWED_ORIGINS: "${PUBLIC_ALLOWED_ORIGINS:-http://localhost}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      RATE_LIMIT_PUBLIC_RPS: "${RATE_LIMIT_PUBLIC_RPS:-20}"
      RATE_LIMIT_ADMIN_RPS: "${RATE_LIMIT_ADMIN_RPS:-5}"
    networks:
      - internal
      - external
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - external
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  internal:
    # 内部网络：postgres、redis、backend 通信
    internal: true
  external:
    # 外部网络：backend、frontend 对外
